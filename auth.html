<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Account | Shyam Creation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4081,#ff9800);
padding:20px;
}

.auth-card{
background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:20px;
color:#ff4081;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff4081;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.95;
}

.toggle{
margin-top:15px;
text-align:center;
cursor:pointer;
color:#ff4081;
font-weight:600;
}

.home-link{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#333;
}

.error{
color:red;
font-size:14px;
margin-bottom:10px;
display:none;
}

.success{
color:green;
font-size:14px;
margin-bottom:10px;
display:none;
}

</style>

</head>

<body>

<div class="auth-card">

<h1 id="formTitle">
Sign In
</h1>

<div id="errorMsg" class="error"></div>
<div id="successMsg" class="success"></div>

<input
type="text"
id="name"
placeholder="Full Name"
style="display:none;">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<button id="submitBtn">
Sign In
</button>

<div
class="toggle"
id="toggleMode">

Create New Account

</div>

<a
href="index.html"
class="home-link">

← Back to Store

</a>

</div>

<script src="js/auth.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign In | Shyam Creation</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:25px;border-radius:10px;width:300px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
button{width:100%;padding:10px;background:#ff4081;color:white;border:none;border-radius:6px;cursor:pointer;}
.toggle{margin-top:10px;text-align:center;cursor:pointer;color:#ff4081;}
</style>
</head>

<body>

<div class="box">
    <h2 id="title">Sign In</h2>

    <input id="name" placeholder="Name (only for sign up)" style="display:none;">
    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password" type="password">

    <button onclick="handleAuth()">Continue</button>

    <div class="toggle" onclick="toggleMode()">
        Create new account
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Shyam Creation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f7f7f7;
margin:0;
padding:0;
}

header{
background:#ff4081;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:700;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #eee;
}

.price{
color:#ff4081;
font-weight:700;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.total{
text-align:right;
font-size:22px;
margin-top:20px;
font-weight:700;
}

/* SHIPPING FORM */
form input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

.checkout-btn{
display:block;
width:100%;
text-align:center;
margin-top:15px;
background:#25D366;
color:white;
padding:15px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.empty{
text-align:center;
padding:50px;
color:#888;
}

</style>

</head>

<body>

<header>
🛒 Checkout - Shyam Creation
</header>
<div class="container" id="cart-container"></div>
<script src="checkout.js"></script>

</body>
</html>

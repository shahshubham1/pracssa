<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Shyam Creation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
margin-bottom:20px;
color:#ff4081;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid #eee;
gap:15px;
}

.qty-box{
display:flex;
align-items:center;
gap:10px;
}

.qty-btn{
border:none;
padding:8px 12px;
cursor:pointer;
background:#ff4081;
color:white;
border-radius:6px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.total{
margin-top:20px;
font-size:24px;
font-weight:700;
text-align:right;
}

form{
margin-top:30px;
}

form h2{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:8px;
}

.checkout-btn{
width:100%;
padding:15px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.empty{
text-align:center;
padding:50px;
}

.back-btn{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#ff4081;
color:white;
padding:10px 15px;
border-radius:8px;
}

.order-summary{
background:#fafafa;
padding:15px;
border-radius:10px;
margin-top:20px;
}

@media(max-width:700px){

.cart-item{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Checkout</h1>

<div id="cart-container"></div>

<a href="index.html" class="back-btn">
← Continue Shopping
</a>

</div>

<script src="js/checkout.js"></script>

</body>
</html>

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fafafa;
color:#333;
}

/* ================= HEADER ================= */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fff;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 15px rgba(0,0,0,.08);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:800;
color:#ff4081;
}

nav{
display:flex;
gap:15px;
align-items:center;
}

nav a{
text-decoration:none;
color:#333;
font-weight:500;
}

.cart-btn{
background:#ff4081;
color:white;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
font-weight:600;
}

.social-icons{
margin-top:20px;
display:flex;
justify-content:center;
gap:18px;
}

/* Circle buttons */
.social{
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
transition:all 0.3s ease;
text-decoration:none;
}

/* SVG icon */
.social svg{
width:24px;
height:24px;
fill:#333;
transition:0.3s;
}

/* hover animation */
.social:hover{
transform:translateY(-6px) scale(1.1);
}

/* Instagram gradient */
.social.instagram:hover{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}
.social.instagram:hover svg{fill:white;}

/* Facebook blue */
.social.facebook:hover{
background:#1877f2;
}
.social.facebook:hover svg{fill:white;}

/* X black */
.social.x:hover{
background:#000;
}
.social.x:hover svg{fill:white;}

/* ================= HERO ================= */
.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('images/hero-banner.jpg');

background-position:center;
}

/* ================= SECTION ================= */
.section{
padding:90px 8%;
}

.section-title{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

/* ================= PRODUCTS ================= */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:350px;

}

.card-content{
padding:20px;
}

.category{

color:#ff4081;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.price{
font-size:22px;
font-weight:700;
color:#ff4081;
margin:10px 0;
}

.cart-btn-item{
width:100%;
padding:12px;
background:#ff9800;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

/* ================= CONTACT ================= */
.contact{

text-align:center;

/* ================= SOCIAL ICONS (STEP 2 INCLUDED HERE) ================= */

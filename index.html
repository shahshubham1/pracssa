<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shyam Creation | Women's Fashion Store</title>

<meta name="description" content="Shyam Creation - Latest Sarees, Kurtis, Anarkalis and Western Wear. Order directly through WhatsApp.">
<meta name="keywords" content="Saree, Kurti, Anarkali, Western Wear, Shyam Creation">
<meta name="author" content="Shubham Shah">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{scroll-behavior:smooth;}

body{
background:#fafafa;
color:#333;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fff;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 15px rgba(0,0,0,.08);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:800;
color:#ff4081;
}

nav{
display:flex;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
font-weight:500;
color:#333;
}

nav a:hover{
color:#ff4081;
}

/* CHECKOUT BUTTON */
.cart-btn{
text-decoration:none;
background:#ff4081;
color:white;
padding:8px 15px;
border-radius:20px;
font-weight:600;
}

/* CART BOX */
.cart-box{
position:fixed;
left:20px;
bottom:20px;
background:#111;
color:#fff;
padding:10px 15px;
border-radius:10px;
font-weight:600;
z-index:999;
}

/* HERO */
.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('images/hero-banner.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

/* SECTION */
.section{
padding:90px 8%;
}

.section-title{
font-size:42px;
text-align:center;
margin-bottom:30px;
}

/* SEARCH */
.search-box{
max-width:600px;
margin:auto;
margin-bottom:25px;
}

.search-box input{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

/* FILTERS */
.filters{
text-align:center;
margin-bottom:25px;
}

.filter-btn{
padding:10px 20px;
border:none;
background:#ff4081;
color:white;
border-radius:25px;
margin:5px;
cursor:pointer;
font-weight:600;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* CARD */
.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.category{
display:inline-block;
background:#ffe4ef;
color:#ff4081;
padding:5px 12px;
border-radius:20px;
font-size:13px;
}

.price{
font-size:24px;
font-weight:700;
color:#ff4081;
margin:15px 0;
}

.cart-btn-item{
width:100%;
padding:12px;
border:none;
background:#ff9800;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

/* SOCIAL PREMIUM */
.social-icons{
margin-top:25px;
display:flex;
justify-content:center;
gap:18px;
}

.social{
width:55px;
height:55px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
transition:all 0.3s ease;
}

.social svg{
width:24px;
height:24px;
fill:#333;
transition:0.3s;
}

.social:hover{
transform:translateY(-6px) scale(1.1);
}

/* Instagram */
.social.instagram:hover{
background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
}
.social.instagram:hover svg{fill:white;}

/* Facebook */
.social.facebook:hover{
background:#1877f2;
}
.social.facebook:hover svg{fill:white;}

/* X */
.social.x:hover{
background:#000;
}
.social.x:hover svg{fill:white;}

/* CONTACT */
.contact{
background:linear-gradient(135deg,#ff4081,#ff9800);
color:white;
text-align:center;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:25px;
}

/* WHATSAPP FLOAT ONLY */
.whatsapp-float{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
background:#25D366;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<div class="logo">Shyam Creation</div>

</p>

</section>

</a>

<a class="social facebook" href="https://facebook.com" target="_blank">

</div>

</section>

<footer>

</footer>

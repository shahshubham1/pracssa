<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shyam Creation | Women's Fashion Store</title>

<meta name="description" content="Shyam Creation - Latest Sarees, Kurtis, Anarkalis and Western Wear. Order easily online.">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#fafafa;}
  

/* HEADER */
header{
position:fixed;top:0;left:0;width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 6%;
box-shadow:0 2px 10px rgba(0,0,0,.1);
z-index:1000;
}

.logo{font-size:24px;font-weight:800;color:#ff4081;}

.nav{
display:flex;
gap:15px;
align-items:center;
}

.nav input{
padding:8px 12px;
border:1px solid #ddd;
border-radius:20px;
outline:none;
}

.cart{
background:#ff4081;
color:#fff;
padding:8px 14px;
border-radius:20px;
text-decoration:none;
font-weight:600;
position:relative;
}

#cart-count{
background:red;
color:#fff;
font-size:12px;
padding:2px 6px;
border-radius:50%;
position:absolute;
top:-8px;
right:-8px;
}

/* HERO */
.hero{
height:80vh;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('images/hero-banner.jpg');
background-size:cover;
background-position:center;
margin-top:60px;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
justify-content:center;
padding:20px;
flex-wrap:wrap;
}

.filter-btn{
padding:8px 15px;
border:none;
background:#eee;
border-radius:20px;
cursor:pointer;
}

.filter-btn:hover{
background:#ff4081;
color:white;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px 6%;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:280px;
object-fit:cover;
}

.card-content{padding:15px;}

.price{color:#ff4081;font-weight:700;}

.btn{
width:100%;
padding:10px;
border:none;
cursor:pointer;
margin-top:8px;
border-radius:8px;
font-weight:600;
}

.add{background:#ff9800;color:white;}
.wish{background:#eee;}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
color:#fff;
padding:10px 20px;
border-radius:20px;
display:none;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:10px;
width:300px;
}

.close{
float:right;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">Shyam Creation</div>

<div class="nav">
<input type="text" id="searchInput" placeholder="Search products...">

<a href="checkout.html" class="cart">
🛒 Cart <span id="cart-count">0</span>
</a>
</div>
</header>

<section class="hero"></section>

<!-- FILTER -->
<div class="filters">
<button class="filter-btn">All</button>
<button class="filter-btn">Saree</button>
<button class="filter-btn">Kurti</button>
<button class="filter-btn">Anarkali</button>
<button class="filter-btn">Western</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="product-container"></div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<div id="modal-body"></div>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
